{% extends 'base.html' %}
{% block title %}{{ 'Edit' if customer else 'Add' }} Customer{% endblock %}
{% block page_title %}{{ 'Edit' if customer else 'Add' }} Customer{% endblock %}

{% block content %}
<div style="max-width: 560px;">
<div class="card">
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Full Name *</label>
      <input type="text" name="name" class="form-control" value="{{ customer.name if customer else '' }}" required>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="text" name="phone" class="form-control" value="{{ customer.phone if customer else '' }}" placeholder="+254...">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ customer.email if customer else '' }}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Preferences / Notes</label>
      <textarea name="preferences" class="form-control">{{ customer.preferences if customer else '' }}</textarea>
    </div>
    <div style="display: flex; gap: 10px;">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
      <a href="{{ url_for('customers.index') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
</div>
{% endblock %}
