{% extends 'base.html' %}
{% block title %}Add Supplier{% endblock %}
{% block page_title %}Add Supplier{% endblock %}
{% block content %}
<div style="max-width:560px;">
<div class="card">
  <form method="POST">
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Company Name *</label><input type="text" name="name" class="form-control" required></div>
      <div class="form-group"><label class="form-label">Contact Person</label><input type="text" name="contact_name" class="form-control"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" placeholder="+254..."></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
    </div>
    <div class="form-group"><label class="form-label">Address</label><textarea name="address" class="form-control"></textarea></div>
    <div style="display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Supplier</button>
      <a href="{{ url_for('inventory.suppliers') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
</div>
{% endblock %}
